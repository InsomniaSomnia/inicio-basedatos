<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Vista Registro -->
    <div id="vista-registro">
        <div class="contenedor-principal">
            <form id="formulario-registro" novalidate>
                <h2>Crear tu cuenta</h2>

                <div class="datos-entrada">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" placeholder="Ej: Pedrito alimaña" required minlength="4">
                    <span class="mensaje-error">El usuario debe tener al menos 4 caracteres</span>
                </div>

                <div class="datos-entrada">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                    <span class="mensaje-error">Ingresa una contraseña</span>
                    <div class="barra-seguridad-wrap">
                        <div class="nivel-seguridad" id="nivelseguridad"></div>
                    </div>
                    <div class="mostrar-contrasena">
                        <input type="checkbox" id="ver-contrasena">
                        <label for="ver-contrasena">Mostrar contraseña</label>
                    </div>
                </div>

                <div class="datos-entrada">
                    <label for="confirmar-password">Confirmar Contraseña</label>
                    <input type="password" id="confirmar-password" required>
                    <span class="mensaje-error" id="error-confirmacion">Las contraseñas no coinciden</span>
                    <div class="mostrar-contrasena">
                        <input type="checkbox" id="mostrar-confirmacion">
                        <label for="mostrar-confirmacion">Mostrar contraseña</label>
                    </div>
                </div>

                <p id="mensaje-registro" class="mensaje-feedback"></p>

                <button type="submit">Registrarme</button>

                <p class="link-cambio">¿Ya tienes cuenta? <a href="#" id="ir-login">Inicia sesión</a></p>
            </form>
        </div>
    </div>

    <!-- Vista Login -->
    <div id="vista-login" style="display:none;">
        <div class="contenedor-principal">
            <form id="formulario-login" novalidate>
                <h2>Iniciar Sesión</h2>

                <div class="datos-entrada">
                    <label for="login-username">Nombre de Usuario</label>
                    <input type="text" id="login-username" placeholder="Tu nombre de usuario" required>
                    <span class="mensaje-error">Ingresa tu usuario</span>
                </div>

                <div class="datos-entrada">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required>
                    <span class="mensaje-error">Ingresa tu contraseña</span>
                    <div class="mostrar-contrasena">
                        <input type="checkbox" id="mostrar-login">
                        <label for="mostrar-login">Mostrar contraseña</label>
                    </div>
                </div>

                <p id="mensaje-login" class="mensaje-feedback"></p>

                <button type="submit">Iniciar Sesión</button>

                <p class="link-cambio">¿No tienes cuenta? <a href="#" id="ir-registro">Regístrate</a></p>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
